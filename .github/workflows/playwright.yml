name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  install-dependencies:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v7
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm ci
  run-quality-checks:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: install-dependencies
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v7
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run static quality gates
      run: npm run check
  discover-shards:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: run-quality-checks
    outputs:
      test_count: ${{ steps.compute.outputs.test_count }}
      shard_count: ${{ steps.compute.outputs.shard_count }}
      shards: ${{ steps.compute.outputs.shards }}
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v7
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Compute shard matrix
      id: compute
      env:
        PLAYWRIGHT_TEST_ARGS: ${{ vars.PLAYWRIGHT_TEST_ARGS }}
        MAX_SHARDS: "5"
      run: |
        TEST_COUNT="$(npx playwright test --list ${PLAYWRIGHT_TEST_ARGS:-} | grep -E -c ':[0-9]+:[0-9]+' || true)"
        TEST_COUNT="$(echo "$TEST_COUNT" | tr -d '[:space:]')"

        if [ "$TEST_COUNT" -gt 0 ]; then
          SHARD_COUNT="$TEST_COUNT"
          if [ "$SHARD_COUNT" -gt "$MAX_SHARDS" ]; then
            SHARD_COUNT="$MAX_SHARDS"
          fi
          SHARDS="$(seq 1 "$SHARD_COUNT" | jq -R . | jq -s -c .)"
        else
          SHARD_COUNT=0
          SHARDS='[]'
        fi

        echo "test_count=$TEST_COUNT" >> "$GITHUB_OUTPUT"
        echo "shard_count=$SHARD_COUNT" >> "$GITHUB_OUTPUT"
        echo "shards=$SHARDS" >> "$GITHUB_OUTPUT"
  execute-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: discover-shards
    if: ${{ needs.discover-shards.outputs.test_count != '0' }}
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.discover-shards.outputs.shard_count) }}
      matrix:
        shard: ${{ fromJSON(needs.discover-shards.outputs.shards) }}
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v7
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      env:
        PLAYWRIGHT_TEST_ARGS: ${{ vars.PLAYWRIGHT_TEST_ARGS }}
      run: npx playwright test --shard=${{ matrix.shard }}/${{ needs.discover-shards.outputs.shard_count }} ${PLAYWRIGHT_TEST_ARGS:-}
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: blob-report-${{ matrix.shard }}
        path: blob-report/
        retention-days: 1
  merge-reports:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [execute-tests, discover-shards]
    if: ${{ !cancelled() && needs.discover-shards.outputs.test_count != '0' }}
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v7
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Download blob reports
      uses: actions/download-artifact@v8
      with:
        path: all-blob-reports
        pattern: blob-report-*
        merge-multiple: true
    - name: Merge into HTML and JSON reports
      env:
        PLAYWRIGHT_JSON_OUTPUT_NAME: json-report/results.json
      run: npx playwright merge-reports --reporter html,json ./all-blob-reports
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: |
          playwright-report/
          json-report/
        retention-days: 30
    - name: Delete blob report artifacts
      if: ${{ !cancelled() }}
      uses: geekyeggo/delete-artifact@v6
      with:
        name: blob-report-*
        useGlob: true
